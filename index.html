<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>100 mile Stake Challenge</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    :root {
      --panel-bg: rgba(255, 255, 255, 0.96);
      --text: #172033;
      --muted: #5d6779;
      --border: #d8dde8;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --danger: #b91c1c;
      --ok: #047857;
      --shadow: 0 10px 28px rgba(15, 23, 42, 0.2);
      --radius: 14px;
    }

    * { box-sizing: border-box; }

    html,
    body,
    #map {
      width: 100%;
      height: 100%;
      height: 100dvh;
      margin: 0;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      overscroll-behavior: none;
    }

    #map {
      position: fixed;
      inset: 0;
      background: #dbeafe;
    }

    /* Critical Leaflet positioning fallback, in case external CSS is slow/blocked. */
    .leaflet-pane,
    .leaflet-tile,
    .leaflet-marker-icon,
    .leaflet-marker-shadow,
    .leaflet-tile-container,
    .leaflet-layer,
    .leaflet-overlay-pane svg,
    .leaflet-overlay-pane canvas {
      position: absolute;
      left: 0;
      top: 0;
    }

    .leaflet-container { overflow: hidden; }
    .leaflet-tile { user-select: none; -webkit-user-drag: none; }
    .leaflet-popup-content { font-size: 0.86rem; line-height: 1.35; }

    button,
    select,
    input {
      font: inherit;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 0.82rem;
      font-weight: 800;
      background: var(--accent);
      color: white;
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover { background: var(--accent-dark); }
    button.secondary { background: #e2e8f0; color: #0f172a; }
    button.secondary:hover { background: #cbd5e1; }

    input:focus,
    select:focus,
    button:focus-visible {
      outline: 3px solid rgba(37, 99, 235, 0.18);
      border-color: var(--accent);
    }

    .splash {
      position: fixed;
      inset: 0;
      z-index: 3000;
      display: grid;
      place-items: center;
      padding: 22px;
      background:
        radial-gradient(circle at 50% 30%, rgba(37, 99, 235, 0.18), transparent 32%),
        rgba(15, 23, 42, 0.72);
      backdrop-filter: blur(8px);
    }

    .splash-card {
      width: min(520px, 100%);
      background: rgba(255, 255, 255, 0.97);
      border: 1px solid rgba(255, 255, 255, 0.85);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 28px;
      text-align: center;
    }

    .splash-card h1 {
      margin: 0 0 12px;
      font-size: clamp(1.75rem, 7vw, 3rem);
      line-height: 0.98;
      letter-spacing: -0.05em;
    }

    .splash-card p {
      margin: 0 0 18px;
      color: #334155;
      font-size: clamp(1rem, 3.8vw, 1.18rem);
      line-height: 1.4;
    }

    .app-panel {
      position: absolute;
      z-index: 1000;
      left: 12px;
      bottom: 12px;
      width: min(320px, calc(100vw - 24px));
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      padding: 8px;
      font-size: 0.8rem;
    }

    .compact-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 7px;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
    }

    .message {
      padding: 8px;
      border-radius: 10px;
      background: #f8fafc;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.76rem;
      line-height: 1.25;
    }

    .message.ok { color: var(--ok); }
    .message.error { color: var(--danger); }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 30px;
      padding: 6px 8px;
      border-radius: 10px;
      background: #f8fafc;
      border: 1px solid var(--border);
      color: #334155;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
    }

    .toggle-row input {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
    }

    .search-control,
    .basemap-control {
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 13px;
      box-shadow: var(--shadow);
      padding: 7px;
      backdrop-filter: blur(8px);
    }

    .search-control {
      width: min(360px, calc(100vw - 108px));
    }

    .search-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px;
    }

    .search-row input,
    .basemap-control select {
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 9px;
      color: var(--text);
      background: white;
      font-size: 0.82rem;
    }

    .basemap-control select {
      width: 112px;
      cursor: pointer;
    }

    .search-results {
      display: none;
      margin-top: 7px;
      gap: 6px;
      max-height: min(300px, 46vh);
      overflow: auto;
    }

    .search-results.has-results { display: grid; }

    .result-card {
      width: 100%;
      text-align: left;
      background: white;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 11px;
      padding: 8px 9px;
      cursor: pointer;
      white-space: normal;
    }

    .result-card:hover { border-color: var(--accent); background: #f8fbff; }

    .result-title {
      display: block;
      font-weight: 850;
      font-size: 0.84rem;
      line-height: 1.2;
    }

    .result-subtitle {
      display: block;
      color: var(--muted);
      font-size: 0.73rem;
      line-height: 1.22;
      margin-top: 3px;
    }

    .saved-pick-label {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(15, 23, 42, 0.18);
      border-radius: 999px;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.18);
      color: #0f172a;
      font-size: 0.72rem;
      font-weight: 800;
      padding: 2px 7px;
    }

    .leaflet-tooltip-left.saved-pick-label::before,
    .leaflet-tooltip-right.saved-pick-label::before {
      display: none;
    }

    @media (max-width: 650px) {
      .app-panel {
        left: 10px;
        right: 10px;
        bottom: calc(10px + env(safe-area-inset-bottom));
        width: auto;
        padding: 7px;
      }

      .button-row {
        grid-template-columns: 1fr 1fr;
      }

      .message,
      .toggle-row {
        font-size: 0.72rem;
        padding: 6px 7px;
      }

      button {
        font-size: 0.76rem;
        padding: 7px 8px;
      }

      .search-control {
        width: calc(100vw - 130px);
        min-width: 210px;
        padding: 6px;
      }

      .search-row input,
      .basemap-control select {
        font-size: 0.76rem;
        padding: 7px 8px;
      }

      .basemap-control {
        padding: 6px;
      }

      .basemap-control select {
        width: 94px;
      }

      .leaflet-bottom.leaflet-right {
        bottom: 116px;
      }
    }

    @media (max-width: 380px) {
      .search-control {
        width: calc(100vw - 118px);
        min-width: 188px;
      }

      .search-row {
        grid-template-columns: 1fr;
      }

      .basemap-control select {
        width: 88px;
      }
    }
  </style>
</head>
<body>
  <div id="map" aria-label="Interactive map"></div>

  <div id="splash" class="splash" role="dialog" aria-modal="true" aria-labelledby="splashTitle">
    <div class="splash-card">
      <h1 id="splashTitle">100 mile Stake Challenge</h1>
      <p>Where would you live within 100 miles of (yes miles you pricks!) for the rest of your life? Tap on your location and share it in the post.</p>
      <button id="startButton" type="button">Start picking</button>
    </div>
  </div>

  <aside class="app-panel" aria-label="Map controls">
    <div class="compact-grid">
      <label class="toggle-row" for="previousPicksToggle">
        <input id="previousPicksToggle" type="checkbox" />
        <span>Show previous picks</span>
      </label>

      <div class="button-row">
        <button id="locateButton" class="secondary" type="button">Use my location</button>
        <button id="copyLinkButton" class="secondary" type="button">Copy link</button>
      </div>

      <div id="messageBox" class="message">Tap the map to place a pin.</div>
    </div>
  </aside>

  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    // =========================
    // CONFIG
    // =========================
    const START_VIEW = { lat: 49.5, lng: 1.5, zoom: 4 }; // Western Europe
    const FIXED_RADIUS_MILES = 100;
    const FIXED_RADIUS_METRES = FIXED_RADIUS_MILES * 1609.344;
    const NOMINATIM_URL = 'https://nominatim.openstreetmap.org/search';
    const SAVED_POINTS_URL = './data/points.geojson';

    const nationalityColors = {
      'French': '#1f77b4',
      'Dutch': '#ff7f0e',
      'Dunno.. Some crap, probably a Kiwi?': '#64748b',
      'German': '#111827',
      'Finn': '#2563eb',
      'Spanish': '#dc2626',
      'Welsh': '#16a34a',
      'Eastern European': '#9333ea',
      'Swiss': '#ef4444',
      'Portugal': '#059669'
    };

    // =========================
    // MAP SETUP
    // =========================
    const map = L.map('map', {
      preferCanvas: true,
      zoomControl: false
    }).setView([START_VIEW.lat, START_VIEW.lng], START_VIEW.zoom);

    L.control.zoom({ position: 'bottomright' }).addTo(map);

    const baseLayers = {
      osm: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
      }),
      carto: L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 20,
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>'
      }),
      esri: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        maxZoom: 19,
        attribution: 'Tiles &copy; Esri &mdash; Source: Esri, Maxar, Earthstar Geographics, and the GIS User Community'
      })
    };

    let currentBaseLayer = baseLayers.osm;
    currentBaseLayer.addTo(map);

    const selectedLayer = L.layerGroup().addTo(map);
    const savedPicksLayer = L.layerGroup();
    let currentSelection = null;
    let lastSearchAt = 0;
    let savedPicksLoaded = false;

    // =========================
    // DOM HELPERS
    // =========================
    const splash = document.getElementById('splash');
    const startButton = document.getElementById('startButton');
    const previousPicksToggle = document.getElementById('previousPicksToggle');
    const locateButton = document.getElementById('locateButton');
    const copyLinkButton = document.getElementById('copyLinkButton');
    const messageBox = document.getElementById('messageBox');

    function setMessage(message, type = '') {
      messageBox.textContent = message;
      messageBox.className = `message ${type}`.trim();
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function closeSplash() {
      splash.style.display = 'none';
      setTimeout(() => map.invalidateSize(), 50);
    }

    // =========================
    // MAP TOOL: PLACE SEARCH
    // =========================
    const SearchControl = L.Control.extend({
      options: { position: 'topleft' },
      onAdd: function () {
        const container = L.DomUtil.create('div', 'search-control');
        container.innerHTML = `
          <div class="search-row">
            <input id="placeSearch" type="text" placeholder="Grimsby, Charleroi, Lake Como" aria-label="Place search" />
            <button id="searchButton" type="button">Search</button>
          </div>
          <div id="searchResults" class="search-results" aria-live="polite"></div>
        `;

        L.DomEvent.disableClickPropagation(container);
        L.DomEvent.disableScrollPropagation(container);
        return container;
      }
    });

    map.addControl(new SearchControl());

    const placeSearch = document.getElementById('placeSearch');
    const searchButton = document.getElementById('searchButton');
    const searchResults = document.getElementById('searchResults');

    // =========================
    // MAP TOOL: BASEMAP PICKER
    // =========================
    const BasemapControl = L.Control.extend({
      options: { position: 'topright' },
      onAdd: function () {
        const container = L.DomUtil.create('div', 'basemap-control');
        container.innerHTML = `
          <select id="baseLayerSelect" aria-label="Basemap">
            <option value="osm">Map</option>
            <option value="carto">Light</option>
            <option value="esri">Imagery</option>
          </select>
        `;

        L.DomEvent.disableClickPropagation(container);
        L.DomEvent.disableScrollPropagation(container);
        return container;
      }
    });

    map.addControl(new BasemapControl());

    const baseLayerSelect = document.getElementById('baseLayerSelect');

    baseLayerSelect.addEventListener('change', () => {
      map.removeLayer(currentBaseLayer);
      currentBaseLayer = baseLayers[baseLayerSelect.value] || baseLayers.osm;
      currentBaseLayer.addTo(map);
    });

    async function searchPlaces() {
      const query = placeSearch.value.trim();
      if (!query) {
        setMessage('Type a place name first.', 'error');
        return;
      }

      const now = Date.now();
      if (now - lastSearchAt < 1100) {
        setMessage('Give the search a second before trying again.', 'error');
        return;
      }
      lastSearchAt = now;

      setMessage('Searching places…');
      searchResults.innerHTML = '';
      searchResults.classList.remove('has-results');

      const url = new URL(NOMINATIM_URL);
      url.searchParams.set('format', 'jsonv2');
      url.searchParams.set('limit', '6');
      url.searchParams.set('addressdetails', '1');
      url.searchParams.set('q', query);

      try {
        const response = await fetch(url.toString());
        if (!response.ok) throw new Error(`Search failed: HTTP ${response.status}`);
        const results = await response.json();

        if (!results.length) {
          setMessage('No matching places found.', 'error');
          return;
        }

        results.forEach(result => {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'result-card';
          button.innerHTML = `
            <span class="result-title">${escapeHtml(result.name || result.display_name)}</span>
            <span class="result-subtitle">${escapeHtml(result.display_name)}</span>
          `;
          button.addEventListener('click', () => {
            const lat = Number(result.lat);
            const lng = Number(result.lon);
            if (!Number.isFinite(lat) || !Number.isFinite(lng)) return;
            placeSelection(L.latLng(lat, lng), { zoom: true });
            searchResults.innerHTML = '';
            searchResults.classList.remove('has-results');
            placeSearch.value = result.name || query;
          });
          searchResults.appendChild(button);
        });

        searchResults.classList.add('has-results');
        setMessage(`Found ${results.length} possible place${results.length === 1 ? '' : 's'}.`, 'ok');
      } catch (error) {
        console.error(error);
        setMessage('Search failed. Try again, or tap the map manually.', 'error');
      }
    }

    searchButton.addEventListener('click', searchPlaces);
    placeSearch.addEventListener('keydown', event => {
      if (event.key === 'Enter') searchPlaces();
    });

    // =========================
    // SELECTED POINT
    // =========================
    function placeSelection(latlng, options = {}) {
      currentSelection = { lat: latlng.lat, lng: latlng.lng };
      selectedLayer.clearLayers();

      const marker = L.marker(latlng).bindPopup(`
        <strong>Your pick</strong><br>
        ${latlng.lat.toFixed(6)}, ${latlng.lng.toFixed(6)}
      `);

      const circle = L.circle(latlng, {
        radius: FIXED_RADIUS_METRES,
        color: '#2563eb',
        weight: 2,
        fillColor: '#3b82f6',
        fillOpacity: 0.14
      });

      selectedLayer.addLayer(circle);
      selectedLayer.addLayer(marker);

      setMessage('Pin placed. Copy the link and share it in the post.', 'ok');
      updateUrl(latlng);

      if (options.zoom !== false) {
        map.fitBounds(circle.getBounds(), { padding: [34, 34], maxZoom: 8 });
      }
    }

    function updateUrl(latlng) {
      const url = new URL(window.location.href);
      url.searchParams.set('lat', latlng.lat.toFixed(6));
      url.searchParams.set('lng', latlng.lng.toFixed(6));
      url.searchParams.delete('r');
      window.history.replaceState({}, '', url);
    }

    function loadSelectionFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const lat = Number(params.get('lat'));
      const lng = Number(params.get('lng'));

      if (
        Number.isFinite(lat) &&
        Number.isFinite(lng) &&
        !(Math.abs(lat) < 0.000001 && Math.abs(lng) < 0.000001)
      ) {
        placeSelection(L.latLng(lat, lng), { zoom: true });
      } else {
        map.setView([START_VIEW.lat, START_VIEW.lng], START_VIEW.zoom);
      }
    }

    // =========================
    // PREVIOUS PICKS
    // =========================
    function getSavedPickColor(feature) {
      return nationalityColors[feature?.properties?.Nationality] || '#475569';
    }

    function makeSavedPickIcon(color) {
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512">
          <path fill="${color}" stroke="#ffffff" stroke-width="28" d="M192 0C86 0 0 86 0 192c0 77.4 27 99 172.3 309.7 9.5 13.8 29.9 13.8 39.5 0C357 291 384 269.4 384 192 384 86 298 0 192 0z"/>
          <circle cx="192" cy="192" r="68" fill="#ffffff" opacity="0.92"/>
        </svg>`;

      return new L.Icon({
        iconUrl: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg),
        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34]
      });
    }

    function addSavedPickFeature(feature) {
      const coords = feature?.geometry?.coordinates;
      if (!Array.isArray(coords) || coords.length < 2) return;

      const lng = Number(coords[0]);
      const lat = Number(coords[1]);
      if (!Number.isFinite(lat) || !Number.isFinite(lng)) return;

      const props = feature.properties || {};
      const latlng = L.latLng(lat, lng);
      const color = getSavedPickColor(feature);
      const username = props.Username || props.User || 'Previous pick';

      const circle = L.circle(latlng, {
        radius: FIXED_RADIUS_METRES,
        fillColor: color,
        fillOpacity: 0.11,
        color: color,
        weight: 1.5
      });

      const marker = L.marker(latlng, { icon: makeSavedPickIcon(color) })
        .bindTooltip(escapeHtml(username), {
          permanent: true,
          direction: 'right',
          offset: [10, -24],
          className: 'saved-pick-label'
        })
        .bindPopup(`
          <strong>${escapeHtml(username)}</strong><br>
          <strong>User:</strong> ${escapeHtml(props.User || '')}<br>
          <strong>Nationality:</strong> ${escapeHtml(props.Nationality || '')}<br>
          <strong>Reason:</strong> ${escapeHtml(props.Reason || '')}
        `);

      savedPicksLayer.addLayer(circle);
      savedPicksLayer.addLayer(marker);
    }

    async function loadSavedPicks() {
      try {
        const response = await fetch(SAVED_POINTS_URL, { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const geojson = await response.json();
        savedPicksLayer.clearLayers();
        (geojson.features || []).forEach(addSavedPickFeature);
        savedPicksLoaded = true;
      } catch (error) {
        console.warn('Previous picks were not loaded.', error);
        previousPicksToggle.checked = false;
        previousPicksToggle.disabled = true;
        previousPicksToggle.parentElement.title = 'data/points.geojson was not found.';
      }
    }

    previousPicksToggle.addEventListener('change', async () => {
      if (previousPicksToggle.checked) {
        if (!savedPicksLoaded) await loadSavedPicks();
        if (!previousPicksToggle.disabled) savedPicksLayer.addTo(map);
      } else {
        map.removeLayer(savedPicksLayer);
      }
    });

    // =========================
    // EVENTS
    // =========================
    startButton.addEventListener('click', closeSplash);
    splash.addEventListener('click', event => {
      if (event.target === splash) closeSplash();
    });

    map.on('click', event => placeSelection(event.latlng, { zoom: false }));

    locateButton.addEventListener('click', () => {
      if (!navigator.geolocation) {
        setMessage('Your browser does not support geolocation.', 'error');
        return;
      }

      setMessage('Getting your location…');
      navigator.geolocation.getCurrentPosition(
        position => {
          placeSelection(L.latLng(position.coords.latitude, position.coords.longitude), { zoom: true });
        },
        () => setMessage('Location permission was denied or unavailable.', 'error'),
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
      );
    });

    copyLinkButton.addEventListener('click', async () => {
      if (!currentSelection) {
        setMessage('Tap the map to place a pin first.', 'error');
        return;
      }

      try {
        await navigator.clipboard.writeText(window.location.href);
        setMessage('Link copied. Paste it in the post.', 'ok');
      } catch {
        setMessage('Could not copy automatically. Copy the address bar instead.', 'error');
      }
    });

    // =========================
    // STARTUP
    // =========================
    loadSelectionFromUrl();
    setTimeout(() => map.invalidateSize(), 100);
  </script>
</body>
</html>

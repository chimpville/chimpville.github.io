<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>100 Mile Stake Challenge</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">

  <style>
    :root {
      --panel-bg: rgba(255, 255, 255, 0.96);
      --text: #172033;
      --muted: #5b6475;
      --border: #d7dce5;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --danger: #b91c1c;
      --ok: #047857;
      --shadow: 0 12px 30px rgba(15, 23, 42, 0.18);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      width: 100%;
      margin: 0;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: #dbeafe;
    }

    #map {
      position: fixed;
      inset: 0;
      height: 100vh;
      width: 100vw;
      background: #dbeafe;
    }

    /* Critical Leaflet layout fallback in case external Leaflet CSS fails. */
    .leaflet-container { overflow: hidden; position: relative; }
    .leaflet-pane,
    .leaflet-tile,
    .leaflet-marker-icon,
    .leaflet-marker-shadow,
    .leaflet-tile-container,
    .leaflet-pane > svg,
    .leaflet-pane > canvas,
    .leaflet-zoom-box,
    .leaflet-image-layer,
    .leaflet-layer {
      position: absolute;
      left: 0;
      top: 0;
    }
    .leaflet-tile {
      width: 256px;
      height: 256px;
      user-select: none;
      -webkit-user-drag: none;
    }
    .leaflet-control-container .leaflet-top,
    .leaflet-control-container .leaflet-bottom {
      position: absolute;
      z-index: 1000;
      pointer-events: none;
    }
    .leaflet-top { top: 0; }
    .leaflet-bottom { bottom: 0; }
    .leaflet-left { left: 0; }
    .leaflet-right { right: 0; }
    .leaflet-control { position: relative; z-index: 800; pointer-events: auto; }

    button, select, input {
      font: inherit;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 9px 11px;
      font-weight: 750;
      background: var(--accent);
      color: white;
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover { background: var(--accent-dark); }
    button.secondary { background: #e2e8f0; color: #0f172a; }
    button.secondary:hover { background: #cbd5e1; }

    input[type="text"], select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 10px;
      font-size: 0.92rem;
      background: white;
      color: var(--text);
    }

    input:focus, select:focus, button:focus {
      outline: 3px solid rgba(37, 99, 235, 0.18);
      border-color: var(--accent);
    }

    /* Splash screen */
    .splash {
      position: fixed;
      inset: 0;
      z-index: 2000;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(15, 23, 42, 0.58);
      backdrop-filter: blur(7px);
    }

    .splash[hidden] { display: none; }

    .splash-card {
      width: min(520px, 100%);
      background: rgba(255, 255, 255, 0.97);
      border: 1px solid rgba(226, 232, 240, 0.95);
      border-radius: 24px;
      box-shadow: 0 24px 70px rgba(2, 6, 23, 0.35);
      padding: 24px;
      text-align: center;
    }

    .splash-card h1 {
      margin: 0 0 12px;
      font-size: clamp(1.8rem, 8vw, 3rem);
      line-height: 0.98;
      letter-spacing: -0.05em;
    }

    .splash-card p {
      margin: 0 auto 20px;
      color: #334155;
      font-size: clamp(1rem, 3.6vw, 1.18rem);
      line-height: 1.4;
      max-width: 42ch;
    }

    .splash-actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* Search as a map tool */
    .leaflet-control.search-tool {
      margin-top: 10px;
      margin-right: 10px;
      width: min(380px, calc(100vw - 74px));
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .search-tool-form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 7px;
      padding: 8px;
    }

    .search-results {
      display: grid;
      gap: 6px;
      max-height: min(260px, 38vh);
      overflow: auto;
      padding: 0 8px 8px;
    }

    .result-card {
      width: 100%;
      text-align: left;
      background: white;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 9px 10px;
      cursor: pointer;
      white-space: normal;
    }

    .result-card:hover { border-color: var(--accent); background: #f8fbff; }

    .result-title {
      display: block;
      font-weight: 800;
      font-size: 0.9rem;
      line-height: 1.25;
    }

    .result-subtitle {
      display: block;
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.3;
      margin-top: 3px;
    }

    /* Minimal menu */
    .app-panel {
      position: absolute;
      z-index: 1000;
      left: max(10px, env(safe-area-inset-left));
      bottom: max(10px, env(safe-area-inset-bottom));
      width: min(360px, calc(100vw - 20px));
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      overflow: hidden;
    }

    .panel-inner {
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .tool-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      align-items: center;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .checkbox-line {
      min-height: 40px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 2px;
      color: #334155;
      font-size: 0.9rem;
      font-weight: 700;
    }

    .coords,
    .status {
      font-size: 0.82rem;
      line-height: 1.3;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #f8fafc;
      padding: 8px 9px;
      color: #334155;
      overflow-wrap: anywhere;
    }

    .status { color: var(--muted); }
    .status.ok { color: var(--ok); }
    .status.error { color: var(--danger); }

    .saved-pin-marker {
      position: relative;
      width: 30px;
      height: 40px;
    }

    .saved-pin-head {
      position: absolute;
      left: 4px;
      top: 2px;
      width: 24px;
      height: 24px;
      transform: rotate(-45deg);
      background: var(--pin-colour, #64748b);
      border: 2px solid white;
      border-radius: 50% 50% 50% 0;
      box-shadow: 0 3px 9px rgba(15, 23, 42, 0.38);
    }

    .saved-pin-dot {
      position: absolute;
      left: 50%;
      top: 10px;
      width: 7px;
      height: 7px;
      transform: translateX(-50%);
      background: white;
      border-radius: 999px;
      opacity: 0.95;
      pointer-events: none;
    }

    .leaflet-tooltip.saved-point-label {
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(148, 163, 184, 0.75);
      border-radius: 999px;
      box-shadow: 0 3px 10px rgba(15, 23, 42, 0.20);
      color: #0f172a;
      font-size: 11px;
      font-weight: 800;
      padding: 3px 7px;
    }

    .leaflet-tooltip.saved-point-label::before {
      display: none;
    }

    @media (max-width: 650px) {
      .leaflet-control.search-tool {
        margin-top: 8px;
        margin-right: 8px;
        width: calc(100vw - 76px);
      }

      .search-tool-form {
        grid-template-columns: 1fr 42px;
        gap: 6px;
        padding: 7px;
      }

      .search-tool-form button {
        padding: 9px 0;
      }

      .app-panel {
        right: max(10px, env(safe-area-inset-right));
        width: auto;
      }

      .panel-inner {
        padding: 8px;
      }

      .tool-row {
        grid-template-columns: 1fr;
        gap: 6px;
      }

      .button-row {
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }

      .coords,
      .status {
        font-size: 0.78rem;
        padding: 7px 8px;
      }
    }
  </style>
</head>
<body>
  <div id="map" aria-label="Interactive map"></div>

  <section id="splash" class="splash" role="dialog" aria-modal="true" aria-labelledby="splashTitle">
    <div class="splash-card">
      <h1 id="splashTitle">100 mile Stake Challenge</h1>
      <p>Where would you live within 100 miles of (yes miles you pricks!) for the rest of your life? Tap on your location and share it in the post.</p>
      <div class="splash-actions">
        <button id="startButton" type="button">Start picking</button>
      </div>
    </div>
  </section>

  <aside class="app-panel" aria-label="Map controls">
    <div class="panel-inner">
      <div class="tool-row">
        <select id="baseLayerSelect" aria-label="Basemap">
          <option value="osm">OpenStreetMap</option>
          <option value="carto">Light grey</option>
          <option value="esri" selected>Esri imagery</option>
        </select>

        <label class="checkbox-line">
          <input id="savedPointsToggle" type="checkbox" />
          Previous picks
        </label>
      </div>

      <div class="button-row">
        <button id="locateButton" class="secondary" type="button">Use location</button>
        <button id="copyLinkButton" class="secondary" type="button">Copy link</button>
      </div>

      <div id="coords" class="coords">Tap the map to place your pin.</div>
      <div id="status" class="status">Ready.</div>
    </div>
  </aside>

  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    // =========================
    // CONFIG
    // =========================
    const START_VIEW = { lat: 49.5, lng: 1.5, zoom: 4 };
    const METRES_PER_MILE = 1609.344;
    const FIXED_RADIUS_MILES = 100;
    const FIXED_RADIUS_METRES = FIXED_RADIUS_MILES * METRES_PER_MILE;
    const POINTS_GEOJSON_URL = './data/points.geojson';
    const NOMINATIM_URL = 'https://nominatim.openstreetmap.org/search';

    const NATIONALITY_COLOURS = {
      "French": "#2563eb",
      "Dutch": "#f97316",
      "Dunno.. Some crap, probably a Kiwi?": "#f97316",
      "German": "#111827",
      "Finn": "#16a34a",
      "Spanish": "#eab308",
      "Welsh": "#dc2626",
      "Eastern European": "#9333ea",
      "Swiss": "#ef4444",
      "Portugal": "#059669",
      "Other": "#64748b"
    };

    // =========================
    // MAP SETUP
    // =========================
    const map = L.map('map', { preferCanvas: true }).setView([START_VIEW.lat, START_VIEW.lng], START_VIEW.zoom);
    setTimeout(() => map.invalidateSize(), 100);
    setTimeout(() => map.setView([START_VIEW.lat, START_VIEW.lng], START_VIEW.zoom), 150);

    const baseLayers = {
      osm: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
      }),
      carto: L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 20,
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>'
      }),
      esri: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        maxZoom: 19,
        attribution: 'Tiles &copy; Esri &mdash; Source: Esri, Maxar, Earthstar Geographics, and the GIS User Community'
      })
    };

    let currentBaseLayer = baseLayers.esri;
    currentBaseLayer.addTo(map);

    const selectedLayer = L.layerGroup().addTo(map);
    const savedPointsLayer = L.layerGroup();

    let currentSelection = null;
    let lastSearchAt = 0;

    // =========================
    // DOM HELPERS
    // =========================
    const splash = document.getElementById('splash');
    const startButton = document.getElementById('startButton');
    const baseLayerSelect = document.getElementById('baseLayerSelect');
    const savedPointsToggle = document.getElementById('savedPointsToggle');
    const locateButton = document.getElementById('locateButton');
    const copyLinkButton = document.getElementById('copyLinkButton');
    const coordsBox = document.getElementById('coords');
    const statusBox = document.getElementById('status');

    function setStatus(message, type = '') {
      statusBox.textContent = message;
      statusBox.className = `status ${type}`.trim();
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function formatMiles(miles) {
      return `${miles.toLocaleString()} mile${miles === 1 ? '' : 's'}`;
    }

    // =========================
    // SEARCH CONTROL
    // =========================
    const SearchControl = L.Control.extend({
      onAdd: function () {
        const container = L.DomUtil.create('div', 'leaflet-control search-tool');
        container.innerHTML = `
          <div class="search-tool-form">
            <input id="placeSearch" type="text" autocomplete="off" placeholder="Grimsby, Charleroi, Lake Como" aria-label="Search for a place" />
            <button id="searchButton" type="button" title="Search">⌕</button>
          </div>
          <div id="searchResults" class="search-results" aria-live="polite"></div>
        `;

        L.DomEvent.disableClickPropagation(container);
        L.DomEvent.disableScrollPropagation(container);
        return container;
      }
    });

    map.addControl(new SearchControl({ position: 'topright' }));

    const placeSearch = document.getElementById('placeSearch');
    const searchButton = document.getElementById('searchButton');
    const searchResults = document.getElementById('searchResults');

    async function searchPlaces() {
      const query = placeSearch.value.trim();
      if (!query) {
        setStatus('Type a place name first.', 'error');
        return;
      }

      const now = Date.now();
      if (now - lastSearchAt < 1100) {
        setStatus('Give it a second before searching again.', 'error');
        return;
      }
      lastSearchAt = now;

      setStatus('Searching places…');
      searchResults.innerHTML = '';

      const url = new URL(NOMINATIM_URL);
      url.searchParams.set('format', 'jsonv2');
      url.searchParams.set('limit', '6');
      url.searchParams.set('addressdetails', '1');
      url.searchParams.set('q', query);

      try {
        const response = await fetch(url.toString());
        if (!response.ok) throw new Error(`Search failed: HTTP ${response.status}`);
        const results = await response.json();

        if (!results.length) {
          setStatus('No matching places found.', 'error');
          return;
        }

        setStatus(`Found ${results.length} possible place${results.length === 1 ? '' : 's'}.`, 'ok');

        results.forEach(result => {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'result-card';
          button.innerHTML = `
            <span class="result-title">${escapeHtml(result.name || result.display_name)}</span>
            <span class="result-subtitle">${escapeHtml(result.display_name)}</span>
          `;
          button.addEventListener('click', () => {
            const latlng = L.latLng(Number(result.lat), Number(result.lon));
            placeSelection(latlng, { zoom: true });
            searchResults.innerHTML = '';
          });
          searchResults.appendChild(button);
        });
      } catch (error) {
        console.error(error);
        setStatus('Place search failed. Tap the map manually instead.', 'error');
      }
    }

    // =========================
    // SELECTED POINT + FIXED RADIUS
    // =========================
    function placeSelection(latlng, options = {}) {
      currentSelection = {
        lat: latlng.lat,
        lng: latlng.lng,
        radiusMiles: FIXED_RADIUS_MILES,
        radiusMetres: FIXED_RADIUS_METRES
      };

      selectedLayer.clearLayers();

      const marker = L.marker(latlng).bindPopup(`
        <strong>Selected point</strong><br>
        ${latlng.lat.toFixed(6)}, ${latlng.lng.toFixed(6)}
      `);

      const circle = L.circle(latlng, {
        radius: FIXED_RADIUS_METRES,
        color: '#2563eb',
        weight: 2,
        fillColor: '#3b82f6',
        fillOpacity: 0.14
      });

      selectedLayer.addLayer(circle);
      selectedLayer.addLayer(marker);

      coordsBox.textContent = `${latlng.lat.toFixed(6)}, ${latlng.lng.toFixed(6)}`;
      updateUrl(latlng);

      if (options.zoom !== false) {
        map.fitBounds(circle.getBounds(), { padding: [32, 32], maxZoom: 8 });
      }

      setStatus('Pin placed. Copy the link and share it.', 'ok');
    }

    function updateUrl(latlng) {
      const url = new URL(window.location.href);
      url.searchParams.set('lat', latlng.lat.toFixed(6));
      url.searchParams.set('lng', latlng.lng.toFixed(6));
      url.searchParams.delete('r');
      window.history.replaceState({}, '', url);
    }

    function loadSelectionFromUrl() {
      const params = new URLSearchParams(window.location.search);
      if (!params.has('lat') || !params.has('lng')) return false;

      const lat = Number(params.get('lat'));
      const lng = Number(params.get('lng'));
      const validLatLng = Number.isFinite(lat) && Number.isFinite(lng) &&
        lat >= -90 && lat <= 90 && lng >= -180 && lng <= 180;
      const looksLikeNullIsland = Math.abs(lat) < 0.000001 && Math.abs(lng) < 0.000001;

      if (!validLatLng || looksLikeNullIsland) {
        window.history.replaceState({}, '', window.location.pathname);
        map.setView([START_VIEW.lat, START_VIEW.lng], START_VIEW.zoom);
        return false;
      }

      placeSelection(L.latLng(lat, lng), { zoom: true });
      return true;
    }

    // =========================
    // EXISTING POINTS GEOJSON
    // =========================
    function makeSavedPinIcon(colour) {
      return L.divIcon({
        className: '',
        html: `
          <div class="saved-pin-marker" style="--pin-colour:${escapeHtml(colour)}">
            <div class="saved-pin-head"></div>
            <div class="saved-pin-dot"></div>
          </div>
        `,
        iconSize: [30, 40],
        iconAnchor: [15, 38],
        popupAnchor: [0, -34]
      });
    }

    async function loadSavedPoints() {
      try {
        const response = await fetch(POINTS_GEOJSON_URL);
        if (!response.ok) throw new Error(`Could not load ${POINTS_GEOJSON_URL}`);
        const geojson = await response.json();

        const pointLayer = L.geoJSON(geojson, {
          pointToLayer: (feature, latlng) => {
            const nationality = feature.properties?.Nationality || 'Other';
            const colour = NATIONALITY_COLOURS[nationality] || NATIONALITY_COLOURS.Other;
            const user = feature.properties?.Username || feature.properties?.User || 'Submitted point';

            return L.marker(latlng, {
              icon: makeSavedPinIcon(colour)
            }).bindTooltip(escapeHtml(user), {
              permanent: true,
              direction: 'right',
              offset: [12, -22],
              className: 'saved-point-label'
            });
          },
          onEachFeature: (feature, layer) => {
            const p = feature.properties || {};
            const nationality = p.Nationality || 'Other';
            const colour = NATIONALITY_COLOURS[nationality] || NATIONALITY_COLOURS.Other;

            const popupHtml = `
              <strong>${escapeHtml(p.Username || p.User || 'Submitted point')}</strong><br>
              <b>User:</b> ${escapeHtml(p.User || '')}<br>
              <b>Nationality:</b> ${escapeHtml(nationality)}<br>
              <b>Reason:</b> ${escapeHtml(p.Reason || '')}
            `;

            layer.bindPopup(popupHtml);

            const circle = L.circle(layer.getLatLng(), {
              radius: FIXED_RADIUS_METRES,
              fillColor: colour,
              fillOpacity: 0.12,
              color: colour,
              weight: 2
            }).bindPopup(popupHtml);

            savedPointsLayer.addLayer(circle);
          }
        });

        savedPointsLayer.addLayer(pointLayer);
      } catch (error) {
        console.error(error);
        setStatus('Previous picks did not load. Check data/points.geojson exists on GitHub.', 'error');
      }
    }

    // =========================
    // EVENTS
    // =========================
    startButton.addEventListener('click', () => {
      splash.hidden = true;
      map.invalidateSize();
    });

    splash.addEventListener('click', event => {
      if (event.target === splash) {
        splash.hidden = true;
        map.invalidateSize();
      }
    });

    map.on('click', event => placeSelection(event.latlng, { zoom: false }));

    searchButton.addEventListener('click', searchPlaces);
    placeSearch.addEventListener('keydown', event => {
      if (event.key === 'Enter') searchPlaces();
    });

    baseLayerSelect.addEventListener('change', () => {
      map.removeLayer(currentBaseLayer);
      currentBaseLayer = baseLayers[baseLayerSelect.value] || baseLayers.esri;
      currentBaseLayer.addTo(map);
    });

    savedPointsToggle.addEventListener('change', () => {
      if (savedPointsToggle.checked) savedPointsLayer.addTo(map);
      else map.removeLayer(savedPointsLayer);
    });

    locateButton.addEventListener('click', () => {
      if (!navigator.geolocation) {
        setStatus('Your browser does not support geolocation.', 'error');
        return;
      }
      setStatus('Getting your location…');
      navigator.geolocation.getCurrentPosition(
        position => {
          placeSelection(L.latLng(position.coords.latitude, position.coords.longitude), { zoom: true });
        },
        () => setStatus('Location permission was denied or unavailable.', 'error'),
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
      );
    });

    copyLinkButton.addEventListener('click', async () => {
      if (!currentSelection) {
        setStatus('Place a pin before copying a link.', 'error');
        return;
      }
      try {
        await navigator.clipboard.writeText(window.location.href);
        setStatus('Link copied.', 'ok');
      } catch {
        setStatus('Could not copy automatically. Copy the address bar instead.', 'error');
      }
    });

    // =========================
    // STARTUP
    // =========================
    loadSavedPoints();
    const loadedFromUrl = loadSelectionFromUrl();
    if (!loadedFromUrl) map.setView([START_VIEW.lat, START_VIEW.lng], START_VIEW.zoom);
  </script>
</body>
</html>

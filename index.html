<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>100 mile Stake Challenge</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    :root {
      --panel-bg: rgba(255, 255, 255, 0.96);
      --text: #172033;
      --muted: #5d6779;
      --border: #d8dde8;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --danger: #b91c1c;
      --ok: #047857;
      --shadow: 0 12px 34px rgba(15, 23, 42, 0.22);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    html, body, #map {
      height: 100%;
      width: 100%;
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
    }

    body { overflow: hidden; }
    #map { position: fixed; inset: 0; background: #dbeafe; }

    /* Critical Leaflet positioning fallback, in case external CSS is slow/blocked. */
    .leaflet-pane,
    .leaflet-tile,
    .leaflet-marker-icon,
    .leaflet-marker-shadow,
    .leaflet-tile-container,
    .leaflet-layer,
    .leaflet-overlay-pane svg,
    .leaflet-overlay-pane canvas {
      position: absolute;
      left: 0;
      top: 0;
    }

    .leaflet-container { overflow: hidden; }
    .leaflet-tile { user-select: none; -webkit-user-drag: none; }

    button,
    select,
    input {
      font: inherit;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 12px;
      font-weight: 800;
      background: var(--accent);
      color: white;
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover { background: var(--accent-dark); }
    button.secondary { background: #e2e8f0; color: #0f172a; }
    button.secondary:hover { background: #cbd5e1; }

    .splash {
      position: fixed;
      inset: 0;
      z-index: 3000;
      display: grid;
      place-items: center;
      padding: 22px;
      background:
        radial-gradient(circle at 50% 30%, rgba(37, 99, 235, 0.18), transparent 32%),
        rgba(15, 23, 42, 0.72);
      backdrop-filter: blur(8px);
    }

    .splash-card {
      width: min(520px, 100%);
      background: rgba(255, 255, 255, 0.97);
      border: 1px solid rgba(255, 255, 255, 0.85);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 28px;
      text-align: center;
    }

    .splash-card h1 {
      margin: 0 0 12px;
      font-size: clamp(1.75rem, 7vw, 3rem);
      line-height: 0.98;
      letter-spacing: -0.05em;
    }

    .splash-card p {
      margin: 0 0 18px;
      color: #334155;
      font-size: clamp(1rem, 3.8vw, 1.18rem);
      line-height: 1.4;
    }

    .app-panel {
      position: absolute;
      z-index: 1000;
      left: 12px;
      bottom: 12px;
      width: min(330px, calc(100vw - 24px));
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      padding: 10px;
    }

    .compact-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 10px;
      background: white;
      color: var(--text);
    }

    .coords {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.78rem;
      color: #334155;
      background: #f8fafc;
      padding: 8px;
      border-radius: 10px;
      border: 1px solid var(--border);
      overflow-wrap: anywhere;
    }

    .status {
      padding: 8px;
      border-radius: 10px;
      background: #f8fafc;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.25;
    }

    .status.ok { color: var(--ok); }
    .status.error { color: var(--danger); }

    .search-control {
      width: min(380px, calc(100vw - 88px));
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 8px;
      backdrop-filter: blur(8px);
    }

    .search-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 7px;
    }

    .search-row input {
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      color: var(--text);
      background: white;
    }

    input:focus,
    select:focus {
      outline: 3px solid rgba(37, 99, 235, 0.18);
      border-color: var(--accent);
    }

    .search-results {
      display: none;
      margin-top: 8px;
      gap: 6px;
      max-height: min(310px, 46vh);
      overflow: auto;
    }

    .search-results.has-results { display: grid; }

    .result-card {
      width: 100%;
      text-align: left;
      background: white;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 11px;
      padding: 9px 10px;
      cursor: pointer;
      white-space: normal;
    }

    .result-card:hover { border-color: var(--accent); background: #f8fbff; }

    .result-title {
      display: block;
      font-weight: 850;
      font-size: 0.9rem;
      line-height: 1.22;
    }

    .result-subtitle {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.25;
      margin-top: 3px;
    }

    .leaflet-popup-content { font-size: 0.9rem; line-height: 1.35; }

    @media (max-width: 650px) {
      .app-panel {
        right: 10px;
        left: 10px;
        bottom: 10px;
        width: auto;
        padding: 8px;
      }

      .button-row {
        grid-template-columns: 1fr 1fr;
      }

      .coords,
      .status {
        font-size: 0.74rem;
        padding: 7px;
      }

      .search-control {
        width: calc(100vw - 78px);
        padding: 7px;
      }

      .search-row input {
        padding: 9px;
      }

      .search-row button {
        padding-inline: 10px;
      }
    }
  </style>
</head>
<body>
  <div id="map" aria-label="Interactive map"></div>

  <div id="splash" class="splash" role="dialog" aria-modal="true" aria-labelledby="splashTitle">
    <div class="splash-card">
      <h1 id="splashTitle">100 mile Stake Challenge</h1>
      <p>Where would you live within 100 miles of (yes miles you pricks!) for the rest of your life? Tap on your location and share it in the post.</p>
      <button id="startButton" type="button">Start picking</button>
    </div>
  </div>

  <aside class="app-panel" aria-label="Map controls">
    <div class="compact-grid">
      <select id="baseLayerSelect" aria-label="Basemap">
        <option value="osm">OpenStreetMap</option>
        <option value="carto">Light grey</option>
        <option value="esri">Esri imagery</option>
      </select>

      <div class="button-row">
        <button id="locateButton" class="secondary" type="button">Use my location</button>
        <button id="copyLinkButton" class="secondary" type="button">Copy link</button>
      </div>

      <div id="coords" class="coords">Tap the map to place a pin.</div>
      <div id="status" class="status">Ready.</div>
    </div>
  </aside>

  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    // =========================
    // CONFIG
    // =========================
    const START_VIEW = { lat: 49.5, lng: 1.5, zoom: 4 }; // Western Europe
    const FIXED_RADIUS_MILES = 100;
    const FIXED_RADIUS_METRES = FIXED_RADIUS_MILES * 1609.344;
    const NOMINATIM_URL = 'https://nominatim.openstreetmap.org/search';

    // =========================
    // MAP SETUP
    // =========================
    const map = L.map('map', {
      preferCanvas: true,
      zoomControl: false
    }).setView([START_VIEW.lat, START_VIEW.lng], START_VIEW.zoom);

    L.control.zoom({ position: 'bottomright' }).addTo(map);

    const baseLayers = {
      osm: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
      }),
      carto: L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 20,
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>'
      }),
      esri: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        maxZoom: 19,
        attribution: 'Tiles &copy; Esri &mdash; Source: Esri, Maxar, Earthstar Geographics, and the GIS User Community'
      })
    };

    let currentBaseLayer = baseLayers.osm;
    currentBaseLayer.addTo(map);

    const selectedLayer = L.layerGroup().addTo(map);
    let currentSelection = null;
    let lastSearchAt = 0;

    // =========================
    // DOM HELPERS
    // =========================
    const splash = document.getElementById('splash');
    const startButton = document.getElementById('startButton');
    const baseLayerSelect = document.getElementById('baseLayerSelect');
    const locateButton = document.getElementById('locateButton');
    const copyLinkButton = document.getElementById('copyLinkButton');
    const coordsBox = document.getElementById('coords');
    const statusBox = document.getElementById('status');

    function setStatus(message, type = '') {
      statusBox.textContent = message;
      statusBox.className = `status ${type}`.trim();
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function closeSplash() {
      splash.style.display = 'none';
      setTimeout(() => map.invalidateSize(), 50);
    }

    // =========================
    // PLACE SEARCH CONTROL
    // =========================
    const SearchControl = L.Control.extend({
      options: { position: 'topleft' },
      onAdd: function () {
        const container = L.DomUtil.create('div', 'search-control');
        container.innerHTML = `
          <div class="search-row">
            <input id="placeSearch" type="text" placeholder="Grimsby, Charleroi, Lake Como" aria-label="Place search" />
            <button id="searchButton" type="button">Search</button>
          </div>
          <div id="searchResults" class="search-results" aria-live="polite"></div>
        `;

        L.DomEvent.disableClickPropagation(container);
        L.DomEvent.disableScrollPropagation(container);
        return container;
      }
    });

    map.addControl(new SearchControl());

    const placeSearch = document.getElementById('placeSearch');
    const searchButton = document.getElementById('searchButton');
    const searchResults = document.getElementById('searchResults');

    async function searchPlaces() {
      const query = placeSearch.value.trim();
      if (!query) {
        setStatus('Type a place name first.', 'error');
        return;
      }

      const now = Date.now();
      if (now - lastSearchAt < 1100) {
        setStatus('Give the place search a second before trying again.', 'error');
        return;
      }
      lastSearchAt = now;

      setStatus('Searching places…');
      searchResults.innerHTML = '';
      searchResults.classList.remove('has-results');

      const url = new URL(NOMINATIM_URL);
      url.searchParams.set('format', 'jsonv2');
      url.searchParams.set('limit', '6');
      url.searchParams.set('addressdetails', '1');
      url.searchParams.set('q', query);

      try {
        const response = await fetch(url.toString());
        if (!response.ok) throw new Error(`Search failed: HTTP ${response.status}`);
        const results = await response.json();

        if (!results.length) {
          setStatus('No matching places found.', 'error');
          return;
        }

        results.forEach(result => {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'result-card';
          button.innerHTML = `
            <span class="result-title">${escapeHtml(result.name || result.display_name)}</span>
            <span class="result-subtitle">${escapeHtml(result.display_name)}</span>
          `;
          button.addEventListener('click', () => {
            const lat = Number(result.lat);
            const lng = Number(result.lon);
            if (!Number.isFinite(lat) || !Number.isFinite(lng)) return;
            placeSelection(L.latLng(lat, lng), { zoom: true });
            searchResults.innerHTML = '';
            searchResults.classList.remove('has-results');
            placeSearch.value = result.name || query;
          });
          searchResults.appendChild(button);
        });

        searchResults.classList.add('has-results');
        setStatus(`Found ${results.length} possible place${results.length === 1 ? '' : 's'}.`, 'ok');
      } catch (error) {
        console.error(error);
        setStatus('Place search failed. Try again, or tap the map manually.', 'error');
      }
    }

    searchButton.addEventListener('click', searchPlaces);
    placeSearch.addEventListener('keydown', event => {
      if (event.key === 'Enter') searchPlaces();
    });

    // =========================
    // SELECTED POINT
    // =========================
    function placeSelection(latlng, options = {}) {
      currentSelection = { lat: latlng.lat, lng: latlng.lng };
      selectedLayer.clearLayers();

      const marker = L.marker(latlng).bindPopup(`
        <strong>Your pick</strong><br>
        ${latlng.lat.toFixed(6)}, ${latlng.lng.toFixed(6)}
      `);

      const circle = L.circle(latlng, {
        radius: FIXED_RADIUS_METRES,
        color: '#2563eb',
        weight: 2,
        fillColor: '#3b82f6',
        fillOpacity: 0.14
      });

      selectedLayer.addLayer(circle);
      selectedLayer.addLayer(marker);

      coordsBox.textContent = `${latlng.lat.toFixed(6)}, ${latlng.lng.toFixed(6)}`;
      setStatus('Pin placed. Copy the link and share it in the post.', 'ok');
      updateUrl(latlng);

      if (options.zoom !== false) {
        map.fitBounds(circle.getBounds(), { padding: [34, 34], maxZoom: 8 });
      }
    }

    function updateUrl(latlng) {
      const url = new URL(window.location.href);
      url.searchParams.set('lat', latlng.lat.toFixed(6));
      url.searchParams.set('lng', latlng.lng.toFixed(6));
      url.searchParams.delete('r');
      window.history.replaceState({}, '', url);
    }

    function loadSelectionFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const lat = Number(params.get('lat'));
      const lng = Number(params.get('lng'));

      if (
        Number.isFinite(lat) &&
        Number.isFinite(lng) &&
        !(Math.abs(lat) < 0.000001 && Math.abs(lng) < 0.000001)
      ) {
        placeSelection(L.latLng(lat, lng), { zoom: true });
      } else {
        map.setView([START_VIEW.lat, START_VIEW.lng], START_VIEW.zoom);
      }
    }

    // =========================
    // EVENTS
    // =========================
    startButton.addEventListener('click', closeSplash);
    splash.addEventListener('click', event => {
      if (event.target === splash) closeSplash();
    });

    map.on('click', event => placeSelection(event.latlng, { zoom: false }));

    baseLayerSelect.addEventListener('change', () => {
      map.removeLayer(currentBaseLayer);
      currentBaseLayer = baseLayers[baseLayerSelect.value] || baseLayers.osm;
      currentBaseLayer.addTo(map);
    });

    locateButton.addEventListener('click', () => {
      if (!navigator.geolocation) {
        setStatus('Your browser does not support geolocation.', 'error');
        return;
      }

      setStatus('Getting your location…');
      navigator.geolocation.getCurrentPosition(
        position => {
          placeSelection(L.latLng(position.coords.latitude, position.coords.longitude), { zoom: true });
        },
        () => setStatus('Location permission was denied or unavailable.', 'error'),
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
      );
    });

    copyLinkButton.addEventListener('click', async () => {
      if (!currentSelection) {
        setStatus('Place a pin before copying a link.', 'error');
        return;
      }

      try {
        await navigator.clipboard.writeText(window.location.href);
        setStatus('Link copied to clipboard.', 'ok');
      } catch {
        setStatus('Could not copy automatically. Copy the address bar instead.', 'error');
      }
    });

    // =========================
    // STARTUP
    // =========================
    loadSelectionFromUrl();
    setTimeout(() => map.invalidateSize(), 100);
  </script>
</body>
</html>
